<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DETAILS | DEMAIN</title>
    <link rel = "stylesheet" href = "../css/styledetails.css">
</head>
<body class = "detailspage">
    <div class = "background-animation"></div>
    <div class = "details-box">
        <div class = "enter">
            <h1>ENTER THE DETAILS</h1>
        </div>
        <div class = "input-group">
            <label>CAPSULE&nbsp;&nbsp;TITLE</label>
            <input type = "text" placeholder="title for your capsule">
        </div>
        <div class = "input-group">
            <label>SEND&nbsp;&nbsp;TO</label>
            <input type = "email" placeholder="receiver's email">
        </div>
        <div class = "input-group">
            <label>OPEN&nbsp;&nbsp;ON</label>
            <input type = "date" placeholder = "open capsule on?">
        </div>
        <div class = "input-group">
            <label>OPEN&nbsp;&nbsp;AT</label>
            <input type = "time" placeholder="open capsule at?">
        </div>
        <form action = "mycapsules.html">
            <button class = "seal-btn">SEAL CAPSULE</button>
        </form>
    </div>
</body>
</html>
